[pytest]
testpaths = tests
addopts = -ra --tb=short --ignore=tests/integration
markers =
    no_db_isolation: skip session app fixture and per-test DB wipes (unit tests without Postgres)
    integration: Docker Compose acceptance/integration tests
    e2e: Playwright browser tests against a live dev server (run with ``pytest e2e``)
filterwarnings =
    ignore::DeprecationWarning
