<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Omistajaportaali · Pin PMS{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
  <style>
    body { margin: 0; background: var(--bg); color: var(--text); }
    header { background: #0f172a; color: #fff; padding: .8rem 1rem; }
    nav a { color: #fff; margin-right: .75rem; text-decoration: none; }
    main { max-width: 980px; margin: 1.2rem auto; padding: 0 1rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: .5rem; }
  </style>
</head>
<body>
  <header>
    <strong>Omistajaportaali</strong>
    <nav style="margin-top:.4rem;">
      <a href="{{ url_for('owner_portal.dashboard') }}">Etusivu</a>
      <a href="{{ url_for('owner_portal.payouts') }}">Tilitykset</a>
      <a href="{{ url_for('owner_portal.profile') }}">Profiili</a>
      <a href="{{ url_for('owner_portal.logout') }}">Kirjaudu ulos</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
