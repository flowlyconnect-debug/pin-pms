<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Owner Portal · Pin PMS{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f8fafc; color: #111827; }
    header { background: #0f172a; color: #fff; padding: .8rem 1rem; }
    nav a { color: #fff; margin-right: .75rem; text-decoration: none; }
    main { max-width: 980px; margin: 1.2rem auto; padding: 0 1rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: .5rem; }
  </style>
</head>
<body>
  <header>
    <strong>Owner Portal</strong>
    <nav style="margin-top:.4rem;">
      <a href="{{ url_for('owner_portal.dashboard') }}">Dashboard</a>
      <a href="{{ url_for('owner_portal.payouts') }}">Payouts</a>
      <a href="{{ url_for('owner_portal.profile') }}">Profile</a>
      <a href="{{ url_for('owner_portal.logout') }}">Logout</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
