<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Owner Login · Pin PMS</title>
</head>
<body>
  <main style="max-width:460px;margin:3rem auto;font-family:system-ui,sans-serif;">
    <h1>Owner Portal Login</h1>
    {% if error %}<p style="color:#b91c1c;">{{ error }}</p>{% endif %}
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label>Email</label><br>
      <input name="email" type="email" required style="width:100%;margin-bottom:.6rem;"><br>
      <label>Password</label><br>
      <input name="password" type="password" required style="width:100%;margin-bottom:.8rem;"><br>
      <button type="submit">Login</button>
    </form>
  </main>
</body>
</html>
