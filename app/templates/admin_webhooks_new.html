{% extends "admin/base.html" %}

{% block title %}Uusi webhook-tilaus · Pin PMS{% endblock %}
{% block page_title %}Uusi webhook-tilaus{% endblock %}

{% block content %}
  <h1>Uusi outbound webhook-tilaus</h1>
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <p>
      <label for="url">Kohde-URL</label><br>
      <input type="url" name="url" id="url" required style="width:100%;max-width:40rem;">
    </p>
    <p>
      <label for="events">Tapahtumat (pilkuilla erotettu)</label><br>
      <textarea name="events" id="events" rows="3" style="width:100%;max-width:40rem;" required placeholder="reservation.created, invoice.paid"></textarea>
    </p>
    <p>
      <button type="submit">Luo tilaus</button>
      <a href="{{ url_for('admin.webhooks_list') }}">Peruuta</a>
    </p>
  </form>
{% endblock %}
