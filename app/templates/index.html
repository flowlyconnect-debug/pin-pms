<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pindora PMS</title>
  </head>
  <body>
    <h1>Pindora PMS</h1>
    {% if current_user.is_authenticated %}
      <p>Signed in as <strong>{{ current_user.email }}</strong> ({{ current_user.role }}).</p>
      {% if current_user.is_superadmin %}
        <p><a href="{{ url_for('admin.audit') }}">Audit log</a></p>
      {% endif %}
      <p><a href="{{ url_for('auth.logout') }}">Logout</a></p>
    {% else %}
      <p><a href="{{ url_for('auth.login') }}">Login</a></p>
    {% endif %}
  </body>
</html>
