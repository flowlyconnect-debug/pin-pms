<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot password · Pindora PMS</title>
  </head>
  <body>
    <h1>Forgot your password?</h1>
    <p>Syötä tiliin liitetty sähköpostiosoite. Jos vastaava
    account exists, you will receive a one-time reset link.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p>{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('auth.forgot_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="email">Sähköposti</label>
      <input id="email" name="email" type="email" required autocomplete="email">
      <button type="submit">Lähetä linkki</button>
    </form>

    <p><a href="{{ url_for('auth.login') }}">Takaisin kirjautumiseen</a></p>
  </body>
</html>
