{% macro render_filters(resource, filters) %}
<form method="get" class="filter-bar">
  <input type="hidden" name="sort" value="{{ filters.sort or 'created_at' }}">
  <input type="hidden" name="dir" value="{{ filters.direction or 'desc' }}">
  <div class="filter-bar-field">
    <label for="{{ resource }}-filters-q">Haku</label>
    <input id="{{ resource }}-filters-q" type="search" name="q" value="{{ filters.q or '' }}" placeholder="Haku">
  </div>
  <div class="filter-bar-field">
    <label for="{{ resource }}-filters-status">Tila</label>
    <select id="{{ resource }}-filters-status" name="status">
      <option value="">Kaikki tilat</option>
      <option value="confirmed" {% if filters.status == 'confirmed' %}selected{% endif %}>{{ "confirmed"|status_label }}</option>
      <option value="pending" {% if filters.status == 'pending' %}selected{% endif %}>{{ "pending"|status_label }}</option>
      <option value="open" {% if filters.status == 'open' %}selected{% endif %}>{{ "open"|status_label }}</option>
      <option value="paid" {% if filters.status == 'paid' %}selected{% endif %}>{{ "paid"|status_label }}</option>
      <option value="overdue" {% if filters.status == 'overdue' %}selected{% endif %}>{{ "overdue"|status_label }}</option>
      <option value="active" {% if filters.status == 'active' %}selected{% endif %}>{{ "active"|status_label }}</option>
      <option value="cancelled" {% if filters.status == 'cancelled' %}selected{% endif %}>{{ "cancelled"|status_label }}</option>
      <option value="draft" {% if filters.status == 'draft' %}selected{% endif %}>{{ "draft"|status_label }}</option>
    </select>
  </div>
  <div class="filter-bar-field">
    <label for="{{ resource }}-filters-from">Alkaen</label>
    <input id="{{ resource }}-filters-from" type="date" name="from" value="{{ request.args.get('from', '') }}">
  </div>
  <div class="filter-bar-field">
    <label for="{{ resource }}-filters-to">Asti</label>
    <input id="{{ resource }}-filters-to" type="date" name="to" value="{{ request.args.get('to', '') }}">
  </div>
  <div class="filter-bar-actions">
    <button type="submit" class="btn btn-primary" data-variant="primary">Suodata</button>
  </div>
</form>
{% endmacro %}
