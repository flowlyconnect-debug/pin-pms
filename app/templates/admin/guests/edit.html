{% extends "admin/base.html" %}

{% block title %}Edit Guest · Pindora PMS{% endblock %}

{% block content %}
  <div class="actions">
    <a class="btn btn-secondary" href="{{ url_for('admin.guests_detail', guest_id=row.id) }}">Back to guest</a>
  </div>
  <h1>Edit guest</h1>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="first_name">First name</label>
    <input id="first_name" name="first_name" type="text" required value="{{ form.first_name }}">
    <label for="last_name">Last name</label>
    <input id="last_name" name="last_name" type="text" required value="{{ form.last_name }}">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{ form.email }}">
    <label for="phone">Phone</label>
    <input id="phone" name="phone" type="text" value="{{ form.phone }}">
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="4">{{ form.notes }}</textarea>
    <label for="preferences">Preferences</label>
    <textarea id="preferences" name="preferences" rows="4">{{ form.preferences }}</textarea>
    <div class="actions">
      <button type="submit">Save guest</button>
    </div>
  </form>
{% endblock %}
