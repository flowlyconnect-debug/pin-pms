{% extends "admin/base.html" %}

{% block title %}Kohde #{{ row.id }} · Pin PMS{% endblock %}

{% block content %}
  <div class="actions">
    <a class="btn btn-secondary" href="{{ url_for('admin.properties_list') }}">Takaisin kohteisiin</a>
    <a class="btn" href="{{ url_for('admin.properties_edit', property_id=row.id) }}">Muokkaa kohdetta</a>
    <a class="btn btn-secondary" href="{{ url_for('admin.units_list', property_id=row.id) }}">Huoneet</a>
    <a class="btn" href="{{ url_for('admin.units_new', property_id=row.id) }}">Uusi huone</a>
  </div>
  <h1>{{ row.name }}</h1>
  <div class="card">
    <p><strong>ID:</strong> {{ row.id }}</p>
    <p><strong>Osoite:</strong> {{ row.address or "—" }}</p>
  </div>
{% endblock %}
