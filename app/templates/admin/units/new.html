{% extends "admin/base.html" %}

{% block title %}Uusi huone · Pin PMS{% endblock %}

{% block content %}
  <div class="actions">
    <a class="btn btn-secondary" href="{{ url_for('admin.units_list', property_id=property_row.id) }}">Takaisin huoneisiin</a>
  </div>
  <h1>Uusi huone for {{ property_row.name }}</h1>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="name">Nimi</label>
    <input id="name" name="name" type="text" required value="{{ form.name }}">
    <label for="unit_type">Tyyppi</label>
    <input id="unit_type" name="unit_type" type="text" value="{{ form.unit_type }}">
    <div class="actions">
      <button type="submit">Luo huone</button>
    </div>
  </form>
{% endblock %}
