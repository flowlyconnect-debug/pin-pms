{% extends "admin/base.html" %}

{% block title %}Muokkaa varausta #{{ row.id }} · Pin PMS{% endblock %}

{% block head_extra %}
  <script src="{{ url_for('static', filename='js/admin-form-helpers.js') }}" defer></script>
  <script src="{{ url_for('static', filename='js/admin-reservations.js') }}" defer></script>
  <style>
    .guest-search-wrap { position: relative; }
    .guest-results {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      z-index: 30;
      margin-top: 4px;
      max-height: 220px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
    }
    .guest-result {
      display: block;
      width: 100%;
      padding: 8px 10px;
      text-align: left;
      background: #fff;
      color: #111827;
      border: 0;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
      font: inherit;
    }
    .guest-result:hover { background: #f3f4f6; }
    .guest-result:last-child { border-bottom: 0; }
    .guest-no-results {
      padding: 8px 10px;
      color: #6b7280;
    }
  </style>
{% endblock %}

{% block content %}
  <div
    id="reservation-form-page"
    data-guest-search-url="{{ url_for('admin.api_guests_search') }}"
    data-has-property-filter="1"
  >
  <div class="actions">
    <a class="btn btn-secondary" href="{{ url_for('admin.calendar_page') }}">Kalenteri</a>
    <a class="btn btn-secondary" href="{{ url_for('admin.reservations_list') }}">Varaukset</a>
    <a class="btn btn-secondary" href="{{ url_for('admin.reservations_detail', reservation_id=row.id) }}">Näytä varaus</a>
  </div>
  <h1>Muokkaa varausta #{{ row.id }}</h1>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="return_to" value="{{ form.return_to }}">

    <div class="guest-search-wrap">
      <label for="guest_search">Asiakas</label>
      <input
        type="text"
        id="guest_search"
        name="guest_search"
        placeholder="Hae asiakas..."
        autocomplete="off"
        value="{{ form.guest_search }}"
      >
      <input type="hidden" id="guest_id" name="guest_id" value="{{ form.guest_id }}">
      <div id="guest_search_results" class="guest-results" aria-live="polite"></div>
      <button type="button" class="btn btn-secondary" id="guest_search_clear" style="margin-top: 0.35rem;">Tyhjennä asiakas</button>
    </div>

    <label for="guest_name">Asiakkaan nimi</label>
    <input id="guest_name" name="guest_name" type="text" required autocomplete="off" value="{{ form.guest_name }}">

    <label for="property_id">Kohde</label>
    <select id="property_id" name="property_id" required>
      <option value="">Valitse kohde</option>
      {% for p in properties %}
        <option value="{{ p.id }}" {% if form.property_id == p.id|string %}selected{% endif %}>{{ p.name }}</option>
      {% endfor %}
    </select>

    <label for="unit_id">Huone</label>
    <select id="unit_id" name="unit_id" required>
      <option value="">Valitse huone</option>
      {% for unit in units %}
        <option
          value="{{ unit.id }}"
          data-property-id="{{ unit.property_id }}"
          {% if form.unit_id == unit.id|string %}selected{% endif %}
        >{{ unit.property.name }} — {{ unit.name }}</option>
      {% endfor %}
    </select>

    <label for="start_date">Alkupäivä</label>
    <input id="start_date" name="start_date" type="date" required value="{{ form.start_date }}">

    <label for="end_date">Loppupäivä</label>
    <input id="end_date" name="end_date" type="date" required value="{{ form.end_date }}">

    <label for="amount">Summa</label>
    <input id="amount" name="amount" type="number" min="0" step="0.01" value="{{ form.amount }}">

    <label for="currency">Valuutta</label>
    <input id="currency" name="currency" type="text" maxlength="3" value="{{ form.currency or 'EUR' }}">

    <label for="status">Tila</label>
    <select id="status" name="status" required>
      <option value="confirmed" {% if form.status == "confirmed" %}selected{% endif %}>Vahvistettu</option>
      <option value="cancelled" {% if form.status == "cancelled" %}selected{% endif %}>Peruttu</option>
    </select>

    <div class="actions">
      <button type="submit" data-variant="primary">Tallenna</button>
    </div>
  </form>
  </div>
{% endblock %}
