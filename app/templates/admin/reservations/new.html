{% extends "admin/base.html" %}

{% block title %}New Reservation · Pindora PMS{% endblock %}

{% block content %}
  <div class="actions">
    <a class="btn btn-secondary" href="{{ url_for('admin.reservations_list') }}">Back to reservations</a>
  </div>
  <h1>Create reservation</h1>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="unit_id">Unit</label>
    <select id="unit_id" name="unit_id" required>
      <option value="">Select unit</option>
      {% for unit in units %}
        <option value="{{ unit.id }}" {% if form.unit_id == unit.id|string %}selected{% endif %}>#{{ unit.id }} - {{ unit.property.name }} / {{ unit.name }}</option>
      {% endfor %}
    </select>
    <label for="guest_id">Guest</label>
    <select id="guest_id" name="guest_id" required>
      <option value="">Select user</option>
      {% for user in users %}
        <option value="{{ user.id }}" {% if form.guest_id == user.id|string %}selected{% endif %}>#{{ user.id }} - {{ user.email }}</option>
      {% endfor %}
    </select>
    <label for="start_date">Start date</label>
    <input id="start_date" name="start_date" type="date" required value="{{ form.start_date }}">
    <label for="end_date">End date</label>
    <input id="end_date" name="end_date" type="date" required value="{{ form.end_date }}">
    <div class="actions">
      <button type="submit">Create reservation</button>
    </div>
  </form>
{% endblock %}
