{% extends "admin/base.html" %}

{% block title %}Create reservation · Pindora PMS{% endblock %}

{% block head_extra %}
  <style>
    .guest-search-wrap { position: relative; }
    .guest-results {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      z-index: 30;
      margin-top: 4px;
      max-height: 220px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
    }
    .guest-result {
      display: block;
      width: 100%;
      padding: 8px 10px;
      text-align: left;
      background: #fff;
      color: #111827;
      border: 0;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
      font: inherit;
    }
    .guest-result:hover { background: #f3f4f6; }
    .guest-result:last-child { border-bottom: 0; }
    .guest-no-results {
      padding: 8px 10px;
      color: #6b7280;
    }
  </style>
{% endblock %}

{% block content %}
  <div class="actions">
    <a class="btn btn-secondary" href="{{ url_for('admin.reservations_list') }}">Takaisin varauksiin</a>
  </div>
  <h1>Create reservation</h1>
  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="unit_id">Huone</label>
    <select id="unit_id" name="unit_id" required>
      <option value="">Valitse huone</option>
      {% for unit in units %}
        <option value="{{ unit.id }}" {% if form.unit_id == unit.id|string %}selected{% endif %}>#{{ unit.id }} - {{ unit.property.name }} / {{ unit.name }}</option>
      {% endfor %}
    </select>

    <div class="guest-search-wrap">
      <label for="guest_search">Asiakas</label>
      <input
        type="text"
        id="guest_search"
        name="guest_search"
        placeholder="Hae asiakas..."
        autocomplete="off"
        value="{{ form.guest_search }}"
      >
      <input type="hidden" id="guest_id" name="guest_id" value="{{ form.guest_id }}">
      <div id="guest_search_results" class="guest-results" aria-live="polite"></div>
      <button type="button" class="btn btn-secondary" id="guest_search_clear" style="margin-top: 0.35rem;">Tyhjennä asiakas</button>
    </div>

    <label for="guest_name">Asiakkaan nimi</label>
    <input id="guest_name" name="guest_name" type="text" value="{{ form.guest_name }}" placeholder="Pakollinen ilman liitettyä asiakasta">
    <label for="start_date">Alkupäivä</label>
    <input id="start_date" name="start_date" type="date" required value="{{ form.start_date }}">
    <label for="end_date">Loppupäivä</label>
    <input id="end_date" name="end_date" type="date" required value="{{ form.end_date }}">
    <label for="amount">Summa</label>
    <input id="amount" name="amount" type="number" min="0" step="0.01" value="{{ form.amount }}">
    <label for="currency">Valuutta</label>
    <input id="currency" name="currency" type="text" maxlength="3" value="{{ form.currency or 'EUR' }}">
    <div class="actions">
      <button type="submit">Uusi varaus</button>
    </div>
  </form>
  <script>
    (function () {
      var searchEl = document.getElementById("guest_search");
      var idEl = document.getElementById("guest_id");
      var resultsEl = document.getElementById("guest_search_results");
      var clearBtn = document.getElementById("guest_search_clear");
      var searchUrl = {{ url_for('admin.api_guests_search') | tojson }};
      if (!searchEl || !idEl || !resultsEl) return;

      var timer = null;

      function hideResults() {
        resultsEl.innerHTML = "";
        resultsEl.style.display = "none";
      }

      function labelForAsiakas(g) {
        var name = (g.name || g.full_name || "").trim();
        var email = (g.email || "").trim();
        if (name && email) {
          return name + " (" + email + ")";
        }
        return name || email || ("Asiakas #" + String(g.id));
      }

      function showPick(g) {
        idEl.value = String(g.id);
        searchEl.value = labelForAsiakas(g);
        hideResults();
      }

      function render(list) {
        if (!list.length) {
          resultsEl.innerHTML = "<div class=\"guest-no-results\">Asiakkaita ei löytynyt</div>";
          resultsEl.style.display = "block";
          return;
        }
        resultsEl.innerHTML = "";
        list.forEach(function (g) {
          var label = labelForAsiakas(g);
          if (!label.trim()) {
            return;
          }
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "guest-result";
          btn.dataset.guestId = String(g.id);
          btn.dataset.guestLabel = label;
          btn.textContent = label;
          btn.addEventListener("click", function () {
            showPick(g);
          });
          resultsEl.appendChild(btn);
        });
        if (!resultsEl.children.length) {
          resultsEl.innerHTML = "<div class=\"guest-no-results\">Asiakkaita ei löytynyt</div>";
        }
        resultsEl.style.display = "block";
      }

      function fetchAsiakkaat(q) {
        if (!String(q || "").trim()) {
          hideResults();
          return;
        }
        fetch(searchUrl + "?q=" + encodeURIComponent(q), { credentials: "same-origin" })
          .then(function (r) {
            return r.json();
          })
          .then(function (data) {
            render(Array.isArray(data) ? data : []);
          })
          .catch(function () {
            hideResults();
          });
      }

      searchEl.addEventListener("input", function () {
        clearTimeout(timer);
        var q = searchEl.value;
        timer = setTimeout(function () {
          fetchAsiakkaat(q);
        }, 200);
      });

      if (clearBtn) {
        clearBtn.addEventListener("click", function () {
          idEl.value = "";
          searchEl.value = "";
          hideResults();
        });
      }

      document.addEventListener("click", function (ev) {
        var wrap = searchEl.closest(".guest-search-wrap");
        if (wrap && !wrap.contains(ev.target)) {
          hideResults();
        }
      });
    })();
  </script>
{% endblock %}
