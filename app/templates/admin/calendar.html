{% extends "admin/base.html" %}

{% block title %}Reservation calendar · Pindora PMS{% endblock %}

{% block head_extra %}
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <style>
    #calendar { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: .5rem; }
    .fc-event-title {
      white-space: normal !important;
      font-size: 12px;
      line-height: 1.2;
    }
    .fc-event-peruttu { opacity: .55; }
    .calendar-filters { margin-bottom: .75rem; display: flex; gap: 1.25rem; align-items: flex-end; flex-wrap: wrap; }
    .calendar-filters label { font-size: .875rem; color: #374151; }
    .calendar-filters select { margin-top: .25rem; min-width: 12rem; padding: .35rem .5rem; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; }
  </style>
{% endblock %}

{% block content %}
  <h1>Reservation calendar</h1>
  <p class="meta">Vedä varausta muuttaaksesi päivämääriä (samat kohdesäännöt myös taustalla). Klikkaus avaa tiedot.</p>
  <div class="calendar-filters">
    <label>
      Event type
      <select id="filter-event-types" aria-label="Suodata tapahtumatyyppi">
        <option value="reservations">Varaukset</option>
        <option value="reservations,leases,invoices,maintenance">All</option>
        <option value="leases">Vuokrasopimukset</option>
        <option value="invoices">Laskut</option>
        <option value="maintenance">Huolto</option>
      </select>
    </label>
    <label>
      Kohde
      <select id="filter-property" aria-label="Suodata kohde">
        <option value="">All properties</option>
        {% for p in properties %}
          <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Huone
      <select id="filter-unit" aria-label="Suodata huone">
        <option value="">All units</option>
        {% for u in units %}
          <option value="{{ u.id }}" data-property-id="{{ u.property_id }}">{{ u.name }}</option>
        {% endfor %}
      </select>
    </label>
  </div>
  <div id="calendar"></div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var el = document.getElementById("calendar");
      var propEl = document.getElementById("filter-property");
      var unitEl = document.getElementById("filter-unit");
      var typeEl = document.getElementById("filter-event-types");
      var csrfMeta = document.querySelector('meta[name="csrf-token"]');
      var csrfToken = csrfMeta ? csrfMeta.getAttribute("content") : "";

      function syncUnitOptionsForProperty() {
        if (!unitEl || !propEl) {
          return;
        }
        var pid = propEl.value;
        var current = unitEl.value;
        for (var i = 0; i < unitEl.options.length; i++) {
          var opt = unitEl.options[i];
          if (!opt.value) {
            opt.hidden = false;
            continue;
          }
          var opid = opt.getAttribute("data-property-id");
          if (!pid || String(opid) === String(pid)) {
            opt.hidden = false;
          } else {
            opt.hidden = true;
          }
        }
        if (current) {
          var sel = null;
          for (var j = 0; j < unitEl.options.length; j++) {
            if (unitEl.options[j].value === current) {
              sel = unitEl.options[j];
              break;
            }
          }
          if (sel && sel.hidden) {
            unitEl.value = "";
          }
        }
      }

      function calendarFilterParams() {
        var params = {};
        if (propEl && propEl.value) {
          params.property_id = propEl.value;
        }
        if (unitEl && unitEl.value) {
          params.unit_id = unitEl.value;
        }
        if (typeEl && typeEl.value) {
          params.event_types = typeEl.value;
        }
        return params;
      }

      var calendar = new FullCalendar.Calendar(el, {
        initialView: "dayGridMonth",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,listMonth",
        },
        dayMaxEvents: true,
        editable: true,
        eventDurationEditable: true,
        eventResizableFromStart: false,
        selectable: false,
        eventSources: [
          {
            url: "{{ url_for('admin.calendar_events') }}",
            method: "GET",
            extraParams: calendarFilterParams,
          },
        ],
        eventDidMount: function (info) {
          var props = info.event.extendedProps || {};
          var st = props.status;
          if (st === "cancelled") {
            info.el.classList.add("fc-event-peruttu");
          }
          info.el.title =
            "Asiakas: " + (props.guest_name || "") + "\n" +
            "Kohde: " + (props.property_name || "") + "\n" +
            "Huone: " + (props.unit_name || "") + "\n" +
            "Tila: " + (props.status || "") + "\n" +
            "Alku: " + (info.event.start ? info.event.start.toLocaleDateString() : "") + "\n" +
            "Loppu: " + (info.event.end ? info.event.end.toLocaleDateString() : "");
        },
        eventClick: function (info) {
          info.jsEvent.preventDefault();
          var rid = info.event.id;
          if (
            rid !== undefined &&
            rid !== null &&
            rid !== "" &&
            /^\d+$/.test(String(rid))
          ) {
            window.location.href = "/admin/reservations/" + String(rid);
            return;
          }
          var targetUrl = info.event.url;
          if (targetUrl) {
            window.location.href = targetUrl;
          }
        },
        eventDrop: function (info) {
          var ev = info.event;
          if (ev.extendedProps && ev.extendedProps.status && !ev.extendedProps.unit_id) {
            info.revert();
            return;
          }
          if (ev.editable === false) {
            info.revert();
            return;
          }
          var start = ev.startStr ? ev.startStr.slice(0, 10) : null;
          var end = ev.endStr ? ev.endStr.slice(0, 10) : null;
          if (!start) {
            info.revert();
            return;
          }
          if (!end) {
            end = start;
          }
          var props = ev.extendedProps || {};
          var unitId = props.unit_id;
          if (unitId === undefined || unitId === null) {
            info.revert();
            alert("Huone puuttuu tältä varaukselta.");
            return;
          }
          var url = "/admin/reservations/" + String(ev.id) + "/move";
          fetch(url, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrfToken,
            },
            body: JSON.stringify({
              start_date: start,
              end_date: end,
              unit_id: unitId,
            }),
          })
            .then(function (res) {
              return res.json().then(function (body) {
                if (!res.ok || !body.success) {
                  info.revert();
                  var msg =
                    body && body.error && body.error.message
                      ? body.error.message
                      : "Move failed.";
                  alert(msg);
                  return;
                }
                info.view.calendar.refetchEvents();
              });
            })
            .catch(function () {
              info.revert();
              alert("Move failed.");
            });
        },
        eventResize: function (info) {
          var ev = info.event;
          if (ev.editable === false) {
            info.revert();
            return;
          }
          var start = ev.startStr ? ev.startStr.slice(0, 10) : null;
          var end = ev.endStr ? ev.endStr.slice(0, 10) : null;
          if (!start || !end) {
            info.revert();
            return;
          }
          var url = "/admin/reservations/" + String(ev.id) + "/resize";
          fetch(url, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              "X-CSRFToken": csrfToken,
            },
            body: JSON.stringify({
              start_date: start,
              end_date: end,
            }),
          })
            .then(function (res) {
              return res.json().then(function (body) {
                if (!res.ok || !body.success) {
                  info.revert();
                  var msg =
                    body && body.error && body.error.message
                      ? body.error.message
                      : "Resize failed.";
                  alert(msg);
                  return;
                }
                info.view.calendar.refetchEvents();
              });
            })
            .catch(function () {
              info.revert();
              alert("Resize failed.");
            });
        },
      });
      calendar.render();
      syncUnitOptionsForProperty();
      if (propEl) {
        propEl.addEventListener("change", function () {
          syncUnitOptionsForProperty();
          calendar.refetchEvents();
        });
      }
      if (unitEl) {
        unitEl.addEventListener("change", function () {
          calendar.refetchEvents();
        });
      }
      if (typeEl) {
        typeEl.addEventListener("change", function () {
          calendar.refetchEvents();
        });
      }
    });
  </script>
{% endblock %}
