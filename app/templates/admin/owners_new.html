{% extends "admin/base.html" %}
{% block title %}Uusi omistaja{% endblock %}
{% block content %}
<h1>Luo omistaja</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>Nimi</label><input name="name" required>
  <label>Sähköposti</label><input name="email" type="email" required>
  <label>Puhelin</label><input name="phone">
  <label>Tilitysten IBAN</label><input name="payout_iban">
  <label>Alkuperäinen portaalisalasana</label><input name="password" type="password">
  <button type="submit">Luo</button>
</form>
{% endblock %}
