<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset password · Pindora PMS</title>
  </head>
  <body>
    <h1>Reset your password</h1>

    {% if error == "invalid_token" %}
      <p>This reset link is invalid, expired, or already used. Please
      <a href="{{ url_for('auth.forgot_password') }}">request a new one</a>.</p>
    {% else %}
      {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="password">New password</label>
        <input id="password" name="password" type="password" minlength="12" required autocomplete="new-password">
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" minlength="12" required autocomplete="new-password">
        <p>Use at least 12 characters. A long passphrase is easier to remember and harder to brute-force.</p>
        <button type="submit">Update password</button>
      </form>
    {% endif %}
  </body>
</html>
