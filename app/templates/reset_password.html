<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vaihda salasana · Pin PMS</title>
  </head>
  <body>
    <h1>Vaihda salasanasi</h1>

    {% if error == "invalid_token" %}
      <p>Tämä palautuslinkki on virheellinen, vanhentunut tai jo käytetty.
      <a href="{{ url_for('auth.forgot_password') }}">Pyydä uusi linkki</a>.</p>
    {% else %}
      {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label for="password">Uusi salasana</label>
        <input id="password" name="password" type="password" minlength="12" required autocomplete="new-password">
        <label for="confirm">Vahvista salasana</label>
        <input id="confirm" name="confirm" type="password" minlength="12" required autocomplete="new-password">
        <p>Käytä vähintään 12 merkkiä. Pitkä salasanalause on helpompi muistaa ja vaikeampi murtaa.</p>
        <button type="submit">Vaihda salasana</button>
      </form>
    {% endif %}
  </body>
</html>
