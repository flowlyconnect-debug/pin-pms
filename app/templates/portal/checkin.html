<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sisäänkirjautuminen verkossa · Pin PMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/portal_checkin.css') }}">
  </head>
  <body>
    <main class="checkin-shell">
      <section class="checkin-card">
        <h1>Sisäänkirjautuminen verkossa</h1>
        <p class="muted">Täytä tietosi, niin saat kulkukoodin.</p>
        {% if error %}
          <div class="alert error">{{ error }}</div>
        {% endif %}
        {% if access_code %}
          <div class="alert success">
            <strong>Ovikoodisi:</strong> {{ access_code }}
            <p>Koodi näytetään vain kerran tällä sivulla ja lähetetään myös sähköpostiisi.</p>
          </div>
        {% else %}
          <form method="post" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="idempotency_key" value="{{ request.headers.get('X-Request-Id', '') }}">
            <label>Koko nimi
              <input type="text" name="full_name" required>
            </label>
            <label>Syntymäaika
              <input type="date" name="date_of_birth" required>
            </label>
            <label>Henkilöllisyystodistuksen kuva
              <input type="file" name="id_document" accept="image/*" required>
            </label>
            <label>Talon sääntöjen allekirjoitus (kirjoita koko nimesi)
              <input type="text" name="rules_signature" required>
            </label>
            <label class="consent">
              <input type="checkbox" name="rules_ok" required> Hyväksyn talon säännöt.
            </label>
            <button type="submit">Viimeistele sisäänkirjautuminen</button>
          </form>
        {% endif %}
      </section>
    </main>
  </body>
</html>
