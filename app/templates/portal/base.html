<!doctype html>
<html lang="{{ g.locale|default(config.get('BABEL_DEFAULT_LOCALE', 'fi')) }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Asiakasportaali · Pin PMS{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/portal.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/skip-link.css') }}">
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f8fafc; color: #111827; }
    header { background: #0f172a; color: #fff; padding: .8rem 1rem; }
    nav a { color: #fff; margin-right: .75rem; text-decoration: none; }
    main { max-width: 980px; margin: 1.2rem auto; padding: 0 1rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: .75rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: .5rem; }
    .flash { background: #ecfeff; border: 1px solid #a5f3fc; padding: .5rem; border-radius: 6px; margin-bottom: .5rem; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: .5rem; border-radius: 6px; margin-bottom: .5rem; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Hyppää sisältöön</a>
  <header>
    <strong>Asiakasportaali</strong>
    <nav role="navigation" aria-label="Portaalin valikko" style="margin-top:.4rem;">
      <a href="{{ url_for('portal.dashboard') }}">Etusivu</a>
      <a href="{{ url_for('portal.reservations') }}">Varaukset</a>
      <a href="{{ url_for('portal.invoices') }}">Laskut</a>
      <a href="{{ url_for('portal.maintenance') }}">Huolto</a>
      <a href="{{ url_for('core.accessibility_statement') }}">Saavutettavuus</a>
      <a href="{{ url_for('portal.logout') }}">Kirjaudu ulos</a>
    </nav>
  </header>
  <main id="main-content" role="main" tabindex="-1">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for m in messages %}
          <div class="flash">{{ m }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
