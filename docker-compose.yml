# Full stack: ``docker compose up -d`` (starts ``web`` + ``db``). Only ``db`` is not enough
# for ``docker compose exec web …`` — the ``web`` service must be running.
services:
  web:
    build: .
    container_name: pindora-web
    env_file:
      - .env
    # Override the image's production CMD (gunicorn) with Flask's dev server
    # so local changes auto-reload. Remove this block to mimic production.
    command: ["flask", "run", "--host=0.0.0.0", "--port=5000", "--debug"]
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - .:/app
      # Persist database backups outside the container so they survive
      # rebuilds. The path inside the container is referenced by BACKUP_DIR.
      - pindora_backups:/var/backups/pindora

  db:
    image: postgres:16-alpine
    container_name: pindora-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Host port 5433 avoids clashing with a local PostgreSQL install on :5432.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  pindora_backups:
