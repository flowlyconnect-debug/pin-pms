# Full stack: ``docker compose up -d`` (starts ``web`` + ``db``). Only ``db`` is not enough
# for ``docker compose exec web …`` — the ``web`` service must be running.
services:
  web:
    build: .
    container_name: pindora-web
    env_file:
      - .env
    # Local stack: always talk to the Compose ``db`` service on port 5432.
    # A copied ``.env`` often has ``POSTGRES_HOST=127.0.0.1`` or a host ``DATABASE_URL``,
    # which breaks *inside* the web container — these entries override ``env_file``.
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL: ""
    # Override the image's production CMD (gunicorn) with Flask's dev server
    # so local changes auto-reload. Remove this block to mimic production.
    command: ["flask", "run", "--host=0.0.0.0", "--port=5000", "--debug"]
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/v1/health', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      # Persist database backups outside the container so they survive
      # rebuilds. The path inside the container is referenced by BACKUP_DIR.
      - pindora_backups:/var/backups/pindora

  db:
    image: postgres:16-alpine
    container_name: pindora-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s
    # Host port 5433 avoids clashing with a local PostgreSQL install on :5432.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  pindora_backups:
