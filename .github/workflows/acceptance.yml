name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        env:
          FORCE_SQLITE_TEST_DB: "1"
          UPLOADS_DIR: ${{ runner.temp }}/test-uploads
        run: |
          mkdir -p "$UPLOADS_DIR"
          python -m pytest tests/ -q --ignore=tests/integration -p no:cov

  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
      ACCEPTANCE_SUPERADMIN_EMAIL: acceptance-superadmin@example.com
      ACCEPTANCE_SUPERADMIN_PASSWORD: ChangeMeAcceptance123!
      ACCEPTANCE_ORG_NAME: Acceptance Test Org
      MAIL_DEV_LOG_ONLY: "1"
      POSTGRES_DB: pin_pms_test
      POSTGRES_USER: pin_pms
      POSTGRES_PASSWORD: pin_pms_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Create test .env
        run: |
          {
            echo "POSTGRES_DB=pin_pms_test"
            echo "POSTGRES_USER=pin_pms"
            echo "POSTGRES_PASSWORD=pin_pms_password"
            echo "DATABASE_URL=postgresql://pin_pms:pin_pms_password@db:5432/pin_pms_test"
            echo "SECRET_KEY=test-secret-key"
            echo "FLASK_ENV=testing"
            echo "APP_ENV=testing"
            echo "MAIL_DEV_LOG_ONLY=1"
          } > .env
      - name: Show Docker versions
        run: |
          docker --version
          docker compose version
      - name: Run acceptance tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pytest tests/integration/ -v
