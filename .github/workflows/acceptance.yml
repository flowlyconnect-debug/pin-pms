name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_SQLITE_TEST_DB: "1"
      UPLOADS_DIR: ${{ github.workspace }}/.test-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          mkdir -p .test-uploads
          python -m pytest tests/ -v --ignore=tests/integration

  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml
      ACCEPTANCE_SUPERADMIN_EMAIL: acceptance-superadmin@example.com
      ACCEPTANCE_SUPERADMIN_PASSWORD: ChangeMeAcceptance123!
      ACCEPTANCE_ORG_NAME: Acceptance Test Org
      MAIL_DEV_LOG_ONLY: "1"
      POSTGRES_DB: pin_pms_test
      POSTGRES_USER: pin_pms
      POSTGRES_PASSWORD: pin_pms_password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create .env for Docker Compose
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_DB=.*/POSTGRES_DB=pin_pms_test/' .env
          sed -i 's/^POSTGRES_USER=.*/POSTGRES_USER=pin_pms/' .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=pin_pms_password/' .env
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=acceptance-test-secret/' .env
          sed -i 's/^MAIL_DEV_LOG_ONLY=.*/MAIL_DEV_LOG_ONLY=1/' .env
          sed -i 's/^FLASK_ENV=.*/FLASK_ENV=development/' .env
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=|' .env
      - name: Show Docker versions
        run: |
          docker --version
          docker compose version
      - name: Run acceptance tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest tests/integration/ -v
