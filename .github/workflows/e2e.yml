name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      UPLOADS_DIR: ${{ github.workspace }}/.test-uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      - name: Run Playwright E2E suite (SQLite live server)
        run: python scripts/test.py e2e
      - name: Upload report + failure screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: reports/
          retention-days: 14
