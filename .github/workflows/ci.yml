name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 1 * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check app/ tests/
      - run: black --check app/ tests/

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: mypy app

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build application image
        run: docker build -t pindora-pms:ci .
      - name: Run unit tests in container
        run: |
          set -o pipefail
          docker run --rm \
            -e FORCE_SQLITE_TEST_DB=1 \
            -e UPLOADS_DIR=/tmp/test-uploads \
            pindora-pms:ci \
            sh -c "python -m pytest tests/ --collect-only 2>&1 | tail -50" | tee collect.txt || true
          if grep -q "ERROR collecting" collect.txt; then
            while IFS= read -r line; do
              echo "::error title=pytest collect::$line"
            done < collect.txt
            exit 2
          fi
          docker run --rm \
            -e FORCE_SQLITE_TEST_DB=1 \
            -e UPLOADS_DIR=/tmp/test-uploads \
            pindora-pms:ci \
            python -m pytest tests/ -q --ignore=tests/integration

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pindora-pms:ci .

  workflow-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1.7.12

  pip-audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pip-audit --desc --progress-spinner off
