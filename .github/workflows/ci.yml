name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 1 * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check app/ tests/
      - run: black --check app/ tests/

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: mypy app

  test:
    runs-on: ubuntu-latest
    env:
      FORCE_SQLITE_TEST_DB: "1"
      UPLOADS_DIR: ${{ github.workspace }}/.test-uploads
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          grep -v -E '^(playwright|pytest-playwright)==' requirements-dev.txt > /tmp/requirements-ci-dev.txt
          pip install -r /tmp/requirements-ci-dev.txt
      - name: Run unit tests
        run: |
          mkdir -p .test-uploads
          python -c "import psycopg2; print('psycopg2', psycopg2.__version__)"
          pytest tests/ -q --ignore=tests/integration -p no:playwright

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t pindora-pms:ci .

  workflow-validator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1.7.12

  pip-audit:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pip-audit --desc --progress-spinner off
